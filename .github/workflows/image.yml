name: Build and Push Docker Image
on:
  push:
    tags:
      - '*.*.*'
      - '!john-*'
jobs:
  call-docker-build:
    permissions:
      contents: read
      packages: write
    uses: adamanteye/actions/.github/workflows/docker.yml@master
    with:
      name: ${{ github.event.repository.name }}
      label: ${{ github.ref_name }}
      owner: ${{ github.repository_owner }}
      platforms: "linux/amd64"
