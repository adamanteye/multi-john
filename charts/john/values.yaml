nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

john:
  # Common configuration across the entire application.
  imageName: ghcr.io/adamanteye/john:0.1.0
  imagePullPolicy: IfNotPresent
  logLevel: debug
  # Shared workspace mounted into the controller and every worker Job at /work.
  # Use a ReadWriteMany-capable StorageClass or set existingClaim to a PVC you manage.
  work:
    enabled: true
    name: ""
    existingClaim: ""
    mountPath: /work
    accessModes:
      - ReadWriteMany
    size: 10Gi
    storageClassName: ""
    annotations: {}
  # Howdy is where you can find your results.
  howdy:
    port: 8080
    serviceType: ClusterIP
    # UI/controller defaults only. Each run still submits its own values.
    defaultTotalNodes: 5
    defaultJohnFlags: ""
  # Worker pod defaults for Jobs created by the controller.
  worker:
    # Strategic merge patch applied to the generated worker PodTemplateSpec.
    # Useful for affinity, tolerations, priorityClassName, imagePullSecrets,
    # extra volumes, sidecars, or extra env/volumeMounts on the "worker" container.
    podTemplatePatch:
      spec:
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: john
                app.kubernetes.io/instance: "{{ .Release.Name }}"
                app.kubernetes.io/component: worker
            matchLabelKeys:
              - john/run-id
    resources:
      requests:
        memory: "1024Mi"
        cpu: "8000m"
      # Limits are intentionally empty by default. John can burst; memory/cpu
      # limits may kill long-running cracking pods under real workloads.
      limits: {}
    # This is where to find the john binary in the container. The default uses PATH.
    johnPath: john
    input:
      path: /input
      file: hashes
etcd:
  # Single-node etcd for worker coordination and result storage.
  replicas: 1
  imageName: quay.io/coreos/etcd:v3.6.11
  imagePullPolicy: IfNotPresent
  port: 2379
  peerPort: 2380
  clientURL: ""
  listenClientURLs: http://[::]:2379
  advertiseClientURLs: ""
  listenPeerURLs: http://[::]:2380
  initialAdvertisePeerURLs: ""
  initialCluster: ""
  requests:
    memory: "128Mi"
    cpu: "1000m"
  limits:
    memory: "256Mi"
    cpu: "2000m"
