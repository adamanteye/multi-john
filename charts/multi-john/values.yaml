multijohn:
  # Common configuration across the entire application.
  totalNodes: 5
  imageName: ghcr.io/adamanteye/multi-john:0.1.1
  imagePullPolicy: IfNotPresent
  logLevel: debug
  # Howdy is where you can find your results.
  howdy:
    port: 8080
    serviceType: NodePort
    jobTTLSecondsAfterFinished: 86400
    jobActiveDeadlineSeconds: 86400
  # Jobs created by the web controller run one worker pod per indexed shard.
  node:
    requests:
      memory: "64Mi"
      cpu: "250m"
    limits:
      memory: "128Mi"
      cpu: "500m"
    # This is where you specify what flags (comma-separated) to pass to john. This includes what kind of hashes are part of johnFile.
    johnFlags: --format=raw-sha256
    # This is where to find the john binary in the container. Unless you're building a custom container, there's no reason to change it.
    johnPath: /jtr/run/john
    johnFile:
      path: /input
      file: hashes
etcd:
  # Single-node etcd used by multi-john for worker coordination and result storage.
  replicas: 1
  imageName: quay.io/coreos/etcd:v3.6.11
  imagePullPolicy: IfNotPresent
  port: 2379
  peerPort: 2380
  requests:
    memory: "128Mi"
    cpu: "1000m"
  limits:
    memory: "256Mi"
    cpu: "2000m"
